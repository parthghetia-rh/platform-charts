{{- if and .Values.rhoai.enabled (eq .Values.controller.name "workshop") }}
{{- $prefix := "" }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: "{{ $prefix }}rhoai-services"
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"
  generators:
    - list:
        elements:
          - application: "{{ $prefix }}node-feature-discovery-service"
            namespace: openshift-nfd
            wave: "1"
            chart: 
              name: nfd
              url: https://na-launch-workshop.github.io/platform-charts
              version: "{{ .Values.nfd.chartVersion }}"
          - application: "{{ $prefix }}nvidia-gpu-service"
            namespace: nvidia-gpu-operator
            wave: "2"
            chart: 
              name: nvidia-gpu-operator
              url: https://na-launch-workshop.github.io/platform-charts
              version: "{{ .Values.nvidiagpu.chartVersion }}"
          - application: "{{ $prefix }}authorino-service"
            namespace: authorino
            wave: "3"
            chart: 
              name: authorino
              url: https://na-launch-workshop.github.io/platform-charts
              version: "{{ .Values.authorino.chartVersion }}"
          - application: "{{ $prefix }}servicemesh-service"
            namespace: istio-system
            wave: "3"
            chart: 
              name: servicemesh
              url: https://na-launch-workshop.github.io/platform-charts
              version: "{{ .Values.servicemesh.chartVersion }}"
          - application: "{{ $prefix }}rhoai-service"
            namespace: redhat-ods-operator
            wave: "4"
            chart: 
              name: rhoai
              url: https://na-launch-workshop.github.io/platform-charts
              version: "{{ .Values.rhoai.chartVersion }}"
  template:
    metadata:
      name: "{{ `{{ .application }}` }}"
    spec:
      destination:
        namespace: "{{ `{{ .namespace }}` }}"
        server: "https://kubernetes.default.svc"
      source:
        chart: "{{ `{{ .chart.name }}` }}"
        targetRevision: "{{ `{{ .chart.version }}` }}"
        repoURL: "{{ `{{ .chart.url }}` }}"
      project: system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            argocd.argoproj.io/managed-by: "{{ .Values.gitops.namespace }}"
        syncOptions:
          - CreateNamespace=true
          - Validate=false
  templatePatch: |
    spec:
      source:
        helm:
        {{ `{{- if (index . "values") }}` }}
          values: |
            {{ `{{- .values | nindent 12 }}` }}
        {{ `{{- end }}` }}
{{- end }}
